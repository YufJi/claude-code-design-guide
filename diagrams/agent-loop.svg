<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="740" height="560" viewBox="0 0 740 560">
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="740" height="560" fill="white"/>

  <!-- Title -->
  <text x="370" y="34" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="bold" fill="#1e40af" text-anchor="middle" dominant-baseline="middle">Claude Code Agent 循环</text>

  <!-- Box 1 -->
  <rect x="120" y="58" width="500" height="58" rx="10" fill="#a5d8ff" stroke="#1e40af" stroke-width="2.5"/>
  <text x="370" y="87" font-family="'Segoe UI',system-ui,sans-serif" font-size="18" font-weight="600" fill="#1e40af" text-anchor="middle" dominant-baseline="middle">用户输入</text>

  <!-- Arrow 1→2 -->
  <line x1="370" y1="118" x2="370" y2="141" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr-blue)"/>

  <!-- Box 2 -->
  <rect x="120" y="143" width="500" height="58" rx="10" fill="#fff3bf" stroke="#92400e" stroke-width="2"/>
  <text x="370" y="172" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="600" fill="#92400e" text-anchor="middle" dominant-baseline="middle">构建消息列表（含历史）</text>

  <!-- Arrow 2→3 -->
  <line x1="370" y1="203" x2="370" y2="226" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr-blue)"/>

  <!-- Box 3 -->
  <rect x="120" y="228" width="500" height="58" rx="10" fill="#c3fae8" stroke="#059669" stroke-width="2"/>
  <text x="370" y="257" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="600" fill="#059669" text-anchor="middle" dominant-baseline="middle">调用 Claude API（流式）</text>

  <!-- Arrow 3→4 -->
  <line x1="370" y1="288" x2="370" y2="311" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr-blue)"/>

  <!-- Box 4 -->
  <rect x="120" y="313" width="500" height="84" rx="10" fill="#dbe4ff" stroke="#3730a3" stroke-width="2"/>
  <text x="370" y="346" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="600" fill="#3730a3" text-anchor="middle" dominant-baseline="middle">响应解析</text>
  <text x="370" y="372" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#374151" text-anchor="middle" dominant-baseline="middle">文本块 → 流式显示  ·  思考块 → 内部处理  ·  工具调用块 → 执行工具</text>

  <!-- Arrow 4→5 -->
  <line x1="370" y1="399" x2="370" y2="428" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr-blue)"/>

  <!-- Box 5 -->
  <rect x="120" y="430" width="500" height="55" rx="10" fill="#d0bfff" stroke="#9333ea" stroke-width="2"/>
  <text x="370" y="457" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="600" fill="#6b21a8" text-anchor="middle" dominant-baseline="middle">工具结果回填到消息列表</text>

  <!-- Loop back: right side -->
  <line x1="622" y1="457" x2="680" y2="457" stroke="#dc2626" stroke-width="2"/>
  <line x1="680" y1="457" x2="680" y2="257" stroke="#dc2626" stroke-width="2"/>
  <line x1="680" y1="257" x2="622" y2="257" stroke="#dc2626" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="700" y="350" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#dc2626" text-anchor="start" dominant-baseline="middle">继续？</text>

  <!-- Footer -->
  <text x="140" y="510" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#6b7280" text-anchor="start" dominant-baseline="middle">← 无工具调用 / 达到轮次限制 → 返回最终结果</text>
</svg>
