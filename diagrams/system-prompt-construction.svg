<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="740" height="620" viewBox="0 0 740 620">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="740" height="620" fill="white"/>

  <!-- Title -->
  <text x="370" y="34" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="bold" fill="#1e40af" text-anchor="middle" dominant-baseline="middle">系统提示构建流程</text>

  <!-- Step 1 -->
  <rect x="90" y="58" width="560" height="72" rx="10" fill="#a5d8ff" stroke="#1e40af" stroke-width="2.5"/>
  <text x="370" y="83" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="600" fill="#1e40af" text-anchor="middle" dominant-baseline="middle">1. 核心指令（固定部分）</text>
  <text x="370" y="108" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#374151" text-anchor="middle" dominant-baseline="middle">角色定义 · 行为准则 · 安全规则</text>

  <!-- Arrow 1→2 -->
  <line x1="370" y1="132" x2="370" y2="156" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="90" y="158" width="560" height="72" rx="10" fill="#b2f2bb" stroke="#059669" stroke-width="2.5"/>
  <text x="370" y="183" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="600" fill="#059669" text-anchor="middle" dominant-baseline="middle">2. 工具定义（动态生成）</text>
  <text x="370" y="208" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#374151" text-anchor="middle" dominant-baseline="middle">根据当前可用工具：name / description / schema</text>

  <!-- Arrow 2→3 -->
  <line x1="370" y1="232" x2="370" y2="256" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="90" y="258" width="560" height="72" rx="10" fill="#fff3bf" stroke="#92400e" stroke-width="2.5"/>
  <text x="370" y="283" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="600" fill="#92400e" text-anchor="middle" dominant-baseline="middle">3. 用户上下文（CLAUDE.md）</text>
  <text x="370" y="308" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#374151" text-anchor="middle" dominant-baseline="middle">项目说明 · 代码规范 · 工作流程</text>

  <!-- Arrow 3→4 -->
  <line x1="370" y1="332" x2="370" y2="356" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="90" y="358" width="560" height="72" rx="10" fill="#c3fae8" stroke="#065f46" stroke-width="2.5"/>
  <text x="370" y="383" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="600" fill="#065f46" text-anchor="middle" dominant-baseline="middle">4. 系统上下文（动态）</text>
  <text x="370" y="408" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#374151" text-anchor="middle" dominant-baseline="middle">Git 状态 · 当前目录 · 环境信息</text>

  <!-- Arrow 4→5 -->
  <line x1="370" y1="432" x2="370" y2="456" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="90" y="458" width="560" height="72" rx="10" fill="#d0bfff" stroke="#6b21a8" stroke-width="2.5"/>
  <text x="370" y="483" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="600" fill="#6b21a8" text-anchor="middle" dominant-baseline="middle">5. 自定义系统提示（可选）</text>
  <text x="370" y="508" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#374151" text-anchor="middle" dominant-baseline="middle">用户通过 --system-prompt 传入</text>

  <!-- Arrow 5→result -->
  <line x1="370" y1="532" x2="370" y2="556" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arr-red)"/>

  <!-- Result -->
  <rect x="150" y="558" width="440" height="52" rx="10" fill="#ffc9c9" stroke="#dc2626" stroke-width="2.5"/>
  <text x="370" y="584" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="600" fill="#dc2626" text-anchor="middle" dominant-baseline="middle">完整系统提示 → 发送给 Claude API</text>
</svg>
